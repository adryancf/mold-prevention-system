; PlatformIO Configuration
; Platform: espressif32 (ESP32)
; Framework: Arduino (provides FreeRTOS, WiFi stack, Preferences/NVS)
;
; Libraries:
;   - DHT sensor library: reads temperature and humidity from DHT22
;   - Adafruit Unified Sensor: required by the DHT library
;   - ArduinoJson: JSON serialization/deserialization for the TCP protocol

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    bblanchon/ArduinoJson @ ^6.21.5

build_flags =
    -DCORE_DEBUG_LEVEL=0
