; Configuração do PlatformIO
; Plataforma: espressif32 (ESP32)
; Framework: Arduino (fornece FreeRTOS, stack WiFi, Preferences/NVS)
;
; Bibliotecas:
;   - DHT sensor library: leitura de temperatura e umidade do DHT22
;   - Adafruit Unified Sensor: requerida pela biblioteca DHT
;   - ArduinoJson: serialização/desserialização JSON para o protocolo TCP

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    bblanchon/ArduinoJson @ ^6.21.5

build_flags =
    -DCORE_DEBUG_LEVEL=0
